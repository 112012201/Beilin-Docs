name: Release Please

on:
  push:
    branches:
      - main  # 只有合并到 main 才触发

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node
          package-name: 北林文档站
          # 自动根据提交信息更新版本号
          # feat: -> minor, fix: -> patch, BREAKING CHANGE: -> major
