name: 02 📦 Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4   # 可选，但建议保留以便其他步骤使用

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node
          package-name: 北林文档站
          changelog-types: '[{"type":"feat","section":"Features","hidden":false},{"type":"fix","section":"Bug Fixes","hidden":false},{"type":"docs","section":"Documentation","hidden":false}]'
          prerelease: true

      - name: Add warning to prerelease
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          current_body=$(gh release view "$TAG_NAME" --repo "$REPO" --json body --jq .body)
          new_body="${current_body}\n\n> **⚠️ 警告：此版本正在Build中，请勿下载源代码。**\n> **⚠️ Warning: This version is being built, do not download the source code.**"
          gh release edit "$TAG_NAME" --repo "$REPO" --notes "$new_body"

      - name: Trigger AutoRC
        if: steps.release.outputs.release_created == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: auto-rc
          client-payload: |
            {
              "tag_name": "${{ steps.release.outputs.tag_name }}",
              "version": "${{ steps.release.outputs.version }}"
            }
