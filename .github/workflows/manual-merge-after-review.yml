name: Manual Merge After Review

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-on-label:
    # 仅当添加 safe-to-merge 标签，且 PR 目标为 main、源为 preview 时执行
    if: |
      github.event.label.name == 'safe-to-merge' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'preview'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Fetch all branches
        run: git fetch --all

      - name: Time-based merge preview into main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git pull origin main

          git merge --no-commit --no-ff origin/preview || true

          if [ -f .git/MERGE_MSG ]; then
            echo "Conflicts detected, resolving by latest modification time..."
            CONFLICTS=$(git diff --name-only --diff-filter=U)
            for file in $CONFLICTS; do
              echo "Resolving conflict for $file"
              TIME_MAIN=$(git log -1 --format=%ct origin/main -- "$file" 2>/dev/null || echo 0)
              TIME_PREVIEW=$(git log -1 --format=%ct origin/preview -- "$file" 2>/dev/null || echo 0)
              if [ $TIME_PREVIEW -gt $TIME_MAIN ]; then
                echo "Using preview version (newer)"
                git checkout --theirs -- "$file"
              else
                echo "Using main version (newer or equal)"
                git checkout --ours -- "$file"
              fi
              git add "$file"
            done
          fi

          if [ -f .git/MERGE_MSG ]; then
            git commit -m "Merge preview into main with time-based conflict resolution (manual review)"
          else
            echo "No merge commit needed (fast-forward?)"
            git merge --ff-only origin/preview || true
          fi

          git push origin HEAD:main

      - name: Add comment to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment $PR_NUMBER --body "Auto-merge completed after manual review."
