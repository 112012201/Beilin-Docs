name: Auto Merge Bot PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-merge:
    name: Check and Merge Bot PRs
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR creator
        id: check_creator
        run: |
          PR_CREATOR="${{ github.event.pull_request.user.login }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_SOURCE="${{ github.event.pull_request.head.ref }}"
          PR_TARGET="${{ github.event.pull_request.base.ref }}"
          
          echo "📋 PR 信息："
          echo "  - 编号: #${PR_NUMBER}"
          echo "  - 标题: ${PR_TITLE}"
          echo "  - 创建者: ${PR_CREATOR}"
          echo "  - 源分支: ${PR_SOURCE}"
          echo "  - 目标分支: ${PR_TARGET}"
          
          # GitHub Actions 机器人的用户名列表
          BOT_USERS=("github-actions" "github-actions[bot]" "dependabot[bot]" "renovate[bot]" "dependabot")
          
          IS_BOT=false
          for bot in "${BOT_USERS[@]}"; do
            if [[ "$PR_CREATOR" == "$bot" ]]; then
              IS_BOT=true
              echo "✅ 这是机器人 (${bot}) 创建的 PR"
              break
            fi
          done
          
          # 也可以根据标题判断（可选）
          if [[ "$PR_TITLE" == "[Auto]"* ]] || [[ "$PR_TITLE" == "[Schedule]"* ]]; then
            echo "✅ 根据标题判断为自动 PR"
            IS_BOT=true
          fi
          
          if [ "$IS_BOT" == "true" ]; then
            echo "should_auto_merge=true" >> $GITHUB_OUTPUT
            echo "creator_type=bot" >> $GITHUB_OUTPUT
          else
            echo "should_auto_merge=false" >> $GITHUB_OUTPUT
            echo "creator_type=human" >> $GITHUB_OUTPUT
          fi

      - name: Add comment for human PR
        if: steps.check_creator.outputs.should_auto_merge == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const prCreator = context.payload.pull_request.user.login;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `## 👤 人工创建的 PR\n\n### 检测结果\n- **创建者**: @${prCreator}\n- **类型**: 人工提交\n\n此 PR 将由人工审核团队进行审查。\n\n### 下一步\n- 等待代码审查\n- 人工合并到 \`main\` 分支\n\n---\n*自动检测：此 PR 由人工创建，已跳过自动合并。*`
            });

      - name: Auto merge bot PR
        if: steps.check_creator.outputs.should_auto_merge == 'true'
        uses: pascalgn/automerge-action@v0.16.4
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          MERGE_LABELS: ""  # 不需要标签
          MERGE_METHOD: "squash"
          MERGE_COMMIT_MESSAGE: "pull-request-title-and-description"
          MERGE_RETRIES: "5"
          MERGE_RETRY_SLEEP: "30000"
          MERGE_REQUIRED_APPROVALS: "0"  # 不需要人工审批
          MERGE_DELETE_BRANCH: "true"    # 合并后删除源分支
          UPDATE_METHOD: "merge"

      - name: Add auto-merge comment for bot PR
        if: steps.check_creator.outputs.should_auto_merge == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const prTitle = context.payload.pull_request.title;
            const prCreator = context.payload.pull_request.user.login;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `## 🤖 机器人 PR 自动合并\n\n### 检测结果\n- **创建者**: ${prCreator}\n- **类型**: 机器人自动创建\n- **PR 标题**: ${prTitle}\n\n### 自动合并信息\n- **状态**: ⏳ 等待 CI 检查通过\n- **合并方式**: squash\n- **合并后操作**: 自动删除源分支\n\n### 自动合并条件\n- ✅ 由机器人创建\n- ⏳ CI 检查通过\n- ⏳ 无合并冲突\n\n---\n*此 PR 将自动合并，无需人工干预。*`
            });

      - name: Log result
        if: always()
        run: |
          echo "## 🔄 PR 处理结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **PR 编号**: #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **PR 标题**: ${{ github.event.pull_request.title }}" >> $GITHUB_STEP_SUMMARY
          echo "- **创建者**: ${{ github.event.pull_request.user.login }}" >> $GITHUB_STEP_SUMMARY
          echo "- **创建者类型**: ${{ steps.check_creator.outputs.creator_type }}" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.check_creator.outputs.should_auto_merge }}" == "true" ]; then
            echo "- **处理方式**: 🤖 自动合并" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **处理方式**: 👤 等待人工审核" >> $GITHUB_STEP_SUMMARY
          fi
