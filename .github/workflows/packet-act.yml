name: AutoRC Package

on:
  repository_dispatch:
    types: [auto-rc]  # 由 Release Please 触发
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.2.3)'
        required: false
  release:
    types: [published]  # 保留原触发方式作为备选

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-package:
    name: Build & Package
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.tag_name || github.event.release.tag_name || 'main' }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.14.0"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm run docs:build

      - name: 📦 Package built files (without parent directories)
        run: |
          # 进入dist目录并打包其所有内容
          cd ./docs/.vuepress/dist
          zip -qq -r ../../../Completed-Build.zip .
          cd ../../..

      - name: 📦 Package source code
        uses: montudor/action-zip@v1
        with:
          args: zip -qq -r Developer-Specific.zip . -x "*.git*" "node_modules/*" "docs/.vuepress/dist/*" "docs/.vuepress/.cache/*" "docs/.vuepress/.temp/*" "*.zip"

      - name: Determine version and changelog
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            # 从 client_payload 获取版本和修改日志
            TAG_NAME="${{ github.event.client_payload.tag_name }}"
            VERSION="${{ github.event.client_payload.version }}"
            
            # 获取修改日志（如果存在）
            if [[ -n "${{ github.event.client_payload.changelog }}" ]]; then
              CHANGELOG="${{ github.event.client_payload.changelog }}"
            else
              # 尝试从CHANGELOG.md文件获取当前版本的内容
              if [[ -f "CHANGELOG.md" ]]; then
                # 提取当前版本的修改日志
                CHANGELOG=$(awk -v version="$VERSION" '
                  /^##? / {
                    if (found) exit
                    if ($0 ~ version || $0 ~ "v" version) found=1
                    next
                  }
                  found && /^##? / {exit}
                  found {print}
                ' CHANGELOG.md)
              fi
            fi
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
            VERSION="${TAG_NAME#v}"
            CHANGELOG="${{ github.event.release.body }}"
          elif [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG_NAME="v${VERSION}"
            # 从CHANGELOG.md获取对应版本的内容
            if [[ -f "CHANGELOG.md" ]]; then
              CHANGELOG=$(awk -v version="$VERSION" '
                /^##? / {
                  if (found) exit
                  if ($0 ~ version || $0 ~ "v" version) found=1
                  next
                }
                found && /^##? / {exit}
                found {print}
              ' CHANGELOG.md)
            fi
          else
            # 默认从 package.json 读取
            VERSION=$(node -p "require('./package.json').version")
            TAG_NAME="v${VERSION}"
          fi
          
          # 将多行内容转换为适合环境变量的格式
          if [[ -n "$CHANGELOG" ]]; then
            # 使用分隔符处理多行文本
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "CHANGELOG<<$EOF" >> $GITHUB_ENV
            echo "$CHANGELOG" >> $GITHUB_ENV
            echo "$EOF" >> $GITHUB_ENV
          fi
          
          echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "✅ 版本号: ${VERSION}, 标签: ${TAG_NAME}"

      - name: Generate release body
        id: generate_body
        run: |
          if [[ -n "${{ env.CHANGELOG }}" ]]; then
            RELEASE_BODY=$(cat << EOF
## 版本 ${VERSION} 发布

### 📝 更新日志

${{ env.CHANGELOG }}

### 📦 包含文件
- \`Completed-Build.zip\`: 构建完成的文档文件（包含dist目录所有内容）
- \`Developer-Specific.zip\`: 完整源代码包（已排除依赖和构建文件）
EOF
)
          else
            RELEASE_BODY=$(cat << EOF
## 版本 ${VERSION} 发布

### 📦 包含文件
- \`Completed-Build.zip\`: 构建完成的文档文件（包含dist目录所有内容）
- \`Developer-Specific.zip\`: 完整源代码包（已排除依赖和构建文件）
EOF
)
          fi
          
          # 使用分隔符处理多行文本
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "RELEASE_BODY<<$EOF" >> $GITHUB_ENV
          echo "$RELEASE_BODY" >> $GITHUB_ENV
          echo "$EOF" >> $GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.VERSION }}
          body: ${{ env.RELEASE_BODY }}
          files: |
            Completed-Build.zip
            Developer-Specific.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
