name: 05 🚀 AutoRC Package

on:
  repository_dispatch:
    types: [auto-rc]  # 由 Release Please 触发
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.2.3)'
        required: false
  release:
    types: [published]  # 保留原触发方式作为备选

permissions:
  contents: write
  releases: write

jobs:
  build-and-package:
    name: Build & Package
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.tag_name || github.event.release.tag_name || 'main' }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.14.0"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm run docs:build

      - name: 📦 Package built files
        uses: montudor/action-zip@v1
        with:
          args: zip -qq -r Completed-Build.zip ./docs/.vuepress/dist

      - name: 📦 Package source code
        uses: montudor/action-zip@v1
        with:
          args: zip -qq -r Developer-Specific.zip . -x "*.git*" "node_modules/*" "docs/.vuepress/dist/*" "docs/.vuepress/.cache/*" "docs/.vuepress/.temp/*" "*.zip"

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            # 从 client_payload 获取版本
            TAG_NAME="${{ github.event.client_payload.tag_name }}"
            VERSION="${{ github.event.client_payload.version }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
            VERSION="${TAG_NAME#v}"
          elif [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG_NAME="v${VERSION}"
          else
            # 默认从 package.json 读取
            VERSION=$(node -p "require('./package.json').version")
            TAG_NAME="v${VERSION}"
          fi
          
          echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "✅ 版本号: ${VERSION}, 标签: ${TAG_NAME}"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.VERSION }}
          body: ${{ github.event.release.body || format('版本 {0} 自动发布', env.VERSION) }}
          files: |
            Completed-Build.zip
            Developer-Specific.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
