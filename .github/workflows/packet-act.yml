name: AutoRC

on:
  release:
    types: [published]  # 当 Release PR 合并后，Release 被发布时触发
  workflow_dispatch:    # 手动触发备选

jobs:
  build-and-package:
    name: Build & Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      releases: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}  # 检出对应标签的代码

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.14.0"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm run docs:build

      # 打包构建产物
      - name: 📦 Package built files
        uses: montudor/action-zip@v1
        with:
          args: zip -qq -r Completed-Build.zip ./docs/.vuepress/dist

      # 打包源代码（排除不需要的文件）
      - name: 📦 Package source code
        uses: montudor/action-zip@v1
        with:
          args: zip -qq -r Developer-Specific.zip . -x "*.git*" "node_modules/*" "docs/.vuepress/dist/*" "docs/.vuepress/.cache/*" "docs/.vuepress/.temp/*" "*.zip"

      # 上传到 Release
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          name: ${{ github.event.release.name }}
          body: ${{ github.event.release.body }}
          files: |
            Completed-Build.zip
            Developer-Specific.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
