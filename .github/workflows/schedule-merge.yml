name: Auto PR from preview to main

on:
  push:
    branches:
      - preview
  workflow_dispatch:        # 允许手动触发

permissions:
  contents: read            # 读取代码
  pull-requests: write      # 创建 PR

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # 获取完整历史，以便比较分支

      - name: Check if preview is ahead of main
        id: check_ahead
        run: |
          # 计算 preview 比 main 多出的提交数量
          AHEAD_COUNT=$(git rev-list --count main..preview 2>/dev/null || echo "0")
          echo "AHEAD_COUNT=$AHEAD_COUNT" >> $GITHUB_OUTPUT
          if [ "$AHEAD_COUNT" -gt 0 ]; then
            echo "preview is ahead of main by $AHEAD_COUNT commits"
          else
            echo "preview is not ahead of main"
          fi

      - name: Check for existing PR
        if: steps.check_ahead.outputs.AHEAD_COUNT != '0'
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 查询是否有从 preview 到 main 的开启 PR
          PR_EXISTS=$(gh pr list --base main --head preview --state open --json number --jq 'length')
          echo "PR_EXISTS=$PR_EXISTS" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.check_ahead.outputs.AHEAD_COUNT != '0' && steps.check_pr.outputs.PR_EXISTS == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head preview \
            --title "Merge preview into main" \
            --body "Automatically created PR because preview branch has commits ahead of main."
