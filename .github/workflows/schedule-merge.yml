name: Schedule Merge to Main

on:
  schedule:
    # 每天凌晨2点运行
    - cron: '0 2 * * *'
  workflow_dispatch:  # 也支持手动触发
    inputs:
      force:
        description: '强制合并（忽略检查）'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-merge-pr:
    name: Create Merge PR from preview to main
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Fetch preview branch
        run: git fetch origin preview

      - name: Check if preview has updates
        id: check_updates
        run: |
          # 检查 preview 是否领先 main
          AHEAD=$(git rev-list --count origin/main..origin/preview)
          
          if [ "$AHEAD" -gt 0 ]; then
            echo "✅ preview 分支领先 main 分支 $AHEAD 个提交"
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "commit_count=$AHEAD" >> $GITHUB_OUTPUT
          else
            echo "ℹ️ preview 分支没有新更新"
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate unique identifier
        id: generate_id
        if: steps.check_updates.outputs.has_updates == 'true'
        run: |
          # 生成日期时间戳
          TIMESTAMP=$(date +"%Y%m%d-%H%M%S")
          
          # 生成 UUID v4
          if command -v uuidgen > /dev/null; then
            UUID=$(uuidgen | tr '[:upper:]' '[:lower:]')
          else
            UUID=$(python3 -c 'import uuid; print(uuid.uuid4())')
          fi
          
          UNIQUE_ID="${TIMESTAMP}-${UUID}"
          
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "uuid=${UUID}" >> $GITHUB_OUTPUT
          echo "unique_id=${UNIQUE_ID}" >> $GITHUB_OUTPUT
          
          echo "✅ 生成唯一标识: ${UNIQUE_ID}"

      - name: Check for existing PR
        id: check_pr
        if: steps.check_updates.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: 'preview',
              base: 'main',
              state: 'open'
            });
            
            if (pulls.length > 0) {
              console.log(`📌 已有打开的 PR #${pulls[0].number}`);
              core.setOutput('pr_exists', 'true');
              core.setOutput('pr_number', pulls[0].number);
            } else {
              console.log('📌 没有打开的 PR');
              core.setOutput('pr_exists', 'false');
            }

      - name: Get commit details
        id: commit_details
        if: steps.check_updates.outputs.has_updates == 'true'
        run: |
          # 获取提交列表并统计
          git log --oneline origin/main..origin/preview > commits.txt
          
          FEAT_COUNT=$(grep -c "^[0-9a-f]\+ feat" commits.txt || echo 0)
          FIX_COUNT=$(grep -c "^[0-9a-f]\+ fix" commits.txt || echo 0)
          DOCS_COUNT=$(grep -c "^[0-9a-f]\+ docs" commits.txt || echo 0)
          BREAKING_COUNT=$(grep -c "BREAKING CHANGE" commits.txt || echo 0)
          
          echo "feat_count=${FEAT_COUNT}" >> $GITHUB_OUTPUT
          echo "fix_count=${FIX_COUNT}" >> $GITHUB_OUTPUT
          echo "docs_count=${DOCS_COUNT}" >> $GITHUB_OUTPUT
          echo "breaking_count=${BREAKING_COUNT}" >> $GITHUB_OUTPUT
          
          # 确定版本建议
          if [ "$BREAKING_COUNT" -gt 0 ]; then
            echo "version_hint=major" >> $GITHUB_OUTPUT
          elif [ "$FEAT_COUNT" -gt 0 ]; then
            echo "version_hint=minor" >> $GITHUB_OUTPUT
          else
            echo "version_hint=patch" >> $GITHUB_OUTPUT
          fi

      # 创建新的 PR（带 auto-merge 标签）
      - name: Create Pull Request with auto-merge
        if: steps.check_updates.outputs.has_updates == 'true' && steps.check_pr.outputs.pr_exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const uniqueId = '${{ steps.generate_id.outputs.unique_id }}';
            const timestamp = '${{ steps.generate_id.outputs.timestamp }}';
            const uuid = '${{ steps.generate_id.outputs.uuid }}';
            
            // 获取提交详情
            const { data: commits } = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: 'main',
              head: 'preview'
            });
            
            // 构建提交列表
            let commitList = '';
            commits.commits.slice(0, 20).forEach(commit => {
              const msg = commit.commit.message.split('\n')[0];
              commitList += `- [\`${commit.sha.slice(0,7)}\`](${commit.html_url}) ${msg}\n`;
            });
            
            if (commits.total_commits > 20) {
              commitList += `- ... 还有 ${commits.total_commits - 20} 个提交\n`;
            }
            
            // 构建 PR 标题（包含唯一标识）
            const prTitle = `[Schedule] Merge preview → main ${timestamp} [${uuid.slice(0,8)}]`;
            
            // 构建 PR 描述
            const prBody = `## 🤖 定时自动合并请求

### 📋 基本信息
- **唯一标识**: \`${uniqueId}\`
- **创建时间**: ${new Date().toISOString()}
- **触发方式**: 定时任务（每天凌晨2点）
- **提交总数**: ${commits.total_commits}

### 📊 提交统计
- ✨ 新功能 (feat): ${{ steps.commit_details.outputs.feat_count }}
- 🐛 修复 (fix): ${{ steps.commit_details.outputs.fix_count }}
- 📝 文档 (docs): ${{ steps.commit_details.outputs.docs_count }}
- 💥 破坏性变更: ${{ steps.commit_details.outputs.breaking_count }}

### 🔍 版本建议
根据提交信息分析，建议版本更新类型：**${{ steps.commit_details.outputs.version_hint }}**

### 📝 提交列表
${commitList}

### ✅ 自动合并
此 PR **已启用自动合并**，所有检查通过后将自动合并到 \`main\` 分支。

---
*ID: \`${uniqueId}\`*`;

            // 创建 PR
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: prTitle,
              head: 'preview',
              base: 'main',
              body: prBody,
              maintainer_can_modify: true
            });
            
            console.log(`✅ 创建 PR #${pr.number}: ${prTitle}`);
            
            // 添加 auto-merge 标签（触发 automerge 工作流）
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['auto-merge', 'schedule-merge', `auto-${timestamp}`]
            });
            
            // 可选：直接启用 GitHub 原生 auto-merge
            try {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                auto_merge: true,
                merge_method: 'squash'
              });
              console.log('✅ 已启用原生 auto-merge');
            } catch (error) {
              console.log('⚠️ 无法启用原生 auto-merge，将依赖标签触发');
            }
            
            // 添加评论确认
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `## 🤖 自动合并已启用

此 PR 已配置自动合并，将在以下条件满足后自动合并：

- [ ] 所有 CI 检查通过
- [ ] 没有合并冲突
- [ ] 分支保护规则满足

⏱️ 预计等待时间：1-5 分钟

[!NOTE]
如果不想自动合并，可以移出 \`auto-merge\` 标签。`
            });

      # 更新现有 PR（如果存在）
      - name: Update existing PR
        if: steps.check_updates.outputs.has_updates == 'true' && steps.check_pr.outputs.pr_exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.check_pr.outputs.pr_number }};
            
            // 获取最新提交
            const { data: commits } = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: 'main',
              head: 'preview'
            });
            
            // 构建更新后的提交列表
            let commitList = '';
            commits.commits.slice(0, 20).forEach(commit => {
              const msg = commit.commit.message.split('\n')[0];
              commitList += `- [\`${commit.sha.slice(0,7)}\`](${commit.html_url}) ${msg}\n`;
            });
            
            // 更新 PR 描述
            const updatedBody = `## 🤖 定时自动合并请求（已更新）

### 📋 基本信息
- **最后更新**: ${new Date().toISOString()}
- **提交总数**: ${commits.total_commits}

### 📝 最新提交列表
${commitList}

### ✅ 自动合并
此 PR 仍保持自动合并状态。

---
*自动更新于 ${new Date().toISOString()}*`;
            
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              body: updatedBody
            });
            
            console.log(`✅ 更新 PR #${prNumber}`);
            
            // 确保 auto-merge 标签存在
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            
            const hasAutoMerge = labels.some(label => label.name === 'auto-merge');
            if (!hasAutoMerge) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: ['auto-merge']
              });
              console.log('✅ 重新添加 auto-merge 标签');
            }

      - name: Send notification
        if: steps.check_updates.outputs.has_updates == 'true'
        run: |
          echo "## 🔄 定时合并任务执行结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **执行时间**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- **更新状态**: preview 分支有 ${{ steps.check_updates.outputs.commit_count }} 个新提交" >> $GITHUB_STEP_SUMMARY
          if [[ '${{ steps.check_pr.outputs.pr_exists }}' == 'true' ]]; then
            echo "- **操作**: 更新现有 PR #${{ steps.check_pr.outputs.pr_number }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **操作**: 创建新 PR（已启用自动合并）" >> $GITHUB_STEP_SUMMARY
            echo "- **唯一标识**: ${{ steps.generate_id.outputs.unique_id }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **状态**: ✅ 完成" >> $GITHUB_STEP_SUMMARY
