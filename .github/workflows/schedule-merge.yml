name: Schedule Merge to Main

on:
  schedule:
    # 每天凌晨2点运行
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: '强制创建PR（即使没有更新）'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-merge-pr:
    name: Create PR from preview to main
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Fetch preview branch
        run: git fetch origin preview

      - name: Check if preview has updates
        id: check_updates
        run: |
          # 检查 preview 是否领先 main
          AHEAD=$(git rev-list --count origin/main..origin/preview 2>/dev/null || echo "0")
          
          echo "preview 领先 main 的提交数: $AHEAD"
          echo "ahead=$AHEAD" >> $GITHUB_OUTPUT
          
          if [ "$AHEAD" -gt 0 ] || [ "${{ github.event.inputs.force }}" == "true" ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate timestamp
        id: timestamp
        if: steps.check_updates.outputs.has_updates == 'true'
        run: |
          TIMESTAMP=$(date +"%Y%m%d-%H%M%S")
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Check for existing PR
        id: check_pr
        if: steps.check_updates.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: 'preview',
              base: 'main',
              state: 'open'
            });
            
            if (pulls.length > 0) {
              console.log(`已有打开的 PR #${pulls[0].number}`);
              core.setOutput('exists', 'true');
              core.setOutput('number', pulls[0].number);
            } else {
              console.log('没有打开的 PR');
              core.setOutput('exists', 'false');
            }

      - name: Get commit details
        id: commits
        if: steps.check_updates.outputs.has_updates == 'true'
        run: |
          # 获取提交列表
          git log --oneline origin/main..origin/preview > commits.txt 2>/dev/null || echo "" > commits.txt
          
          # 统计提交类型（处理空文件的情况）
          if [ -s commits.txt ]; then
            FEAT_COUNT=$(grep -c "^[0-9a-f]\+ feat" commits.txt || echo "0")
            FIX_COUNT=$(grep -c "^[0-9a-f]\+ fix" commits.txt || echo "0")
            DOCS_COUNT=$(grep -c "^[0-9a-f]\+ docs" commits.txt || echo "0")
            TOTAL_COUNT=$(cat commits.txt | wc -l | tr -d ' ' || echo "0")
          else
            FEAT_COUNT="0"
            FIX_COUNT="0"
            DOCS_COUNT="0"
            TOTAL_COUNT="0"
          fi
          
          # 确保输出是字符串格式
          echo "feat_count=${FEAT_COUNT}" >> $GITHUB_OUTPUT
          echo "fix_count=${FIX_COUNT}" >> $GITHUB_OUTPUT
          echo "docs_count=${DOCS_COUNT}" >> $GITHUB_OUTPUT
          echo "total_count=${TOTAL_COUNT}" >> $GITHUB_OUTPUT
          
          echo "统计结果:"
          echo "  feat: ${FEAT_COUNT}"
          echo "  fix: ${FIX_COUNT}"
          echo "  docs: ${DOCS_COUNT}"
          echo "  total: ${TOTAL_COUNT}"

      - name: Create Pull Request
        if: steps.check_updates.outputs.has_updates == 'true' && steps.check_pr.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            // 从 steps 获取变量，在 JavaScript 中处理默认值
            const timestamp = '${{ steps.timestamp.outputs.timestamp }}' || 'unknown';
            const featCount = '${{ steps.commits.outputs.feat_count }}' || '0';
            const fixCount = '${{ steps.commits.outputs.fix_count }}' || '0';
            const docsCount = '${{ steps.commits.outputs.docs_count }}' || '0';
            const totalCount = '${{ steps.commits.outputs.total_count }}' || '0';
            
            // 获取提交详情
            const { data: commits } = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: 'main',
              head: 'preview'
            });
            
            // 构建提交列表字符串
            let commitList = '';
            if (commits.commits && commits.commits.length > 0) {
              commits.commits.slice(0, 15).forEach(commit => {
                const msg = commit.commit.message.split('\n')[0];
                const shortSha = commit.sha.slice(0, 7);
                commitList += `- [\`${shortSha}\`](${commit.html_url}) ${msg}\n`;
              });
              
              if (commits.total_commits > 15) {
                commitList += `- ... 还有 ${commits.total_commits - 15} 个提交\n`;
              }
            } else {
              commitList = '- 没有新提交\n';
            }
            
            // 构建 PR 标题
            const prTitle = `[Schedule] Merge preview → main ${timestamp}`;
            
            // 构建 PR 描述
            const prBody = 
              "## 🤖 定时自动合并请求\n\n" +
              "### 📋 基本信息\n" +
              `- **创建时间**: ${new Date().toISOString()}\n` +
              "- **触发方式**: 定时任务（每天凌晨2点）\n" +
              `- **提交总数**: ${totalCount}\n\n` +
              "### 📊 提交统计\n" +
              `- ✨ 新功能 (feat): ${featCount}\n` +
              `- 🐛 修复 (fix): ${fixCount}\n` +
              `- 📝 文档 (docs): ${docsCount}\n\n` +
              "### 📝 提交列表\n" +
              `${commitList}\n` +
              "### ✅ 自动处理\n" +
              "此 PR 由 GitHub Actions 机器人创建，将**自动合并**到 `main` 分支。\n\n" +
              "---\n" +
              "*由定时任务自动创建*";
            
            // 创建 PR
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: prTitle,
              head: 'preview',
              base: 'main',
              body: prBody,
              maintainer_can_modify: true
            });
            
            console.log(`✅ 创建 PR #${pr.number}: ${prTitle}`);

      - name: Update existing PR
        if: steps.check_updates.outputs.has_updates == 'true' && steps.check_pr.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.check_pr.outputs.number }};
            
            // 获取最新提交
            const { data: commits } = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: 'main',
              head: 'preview'
            });
            
            // 构建提交列表
            let commitList = '';
            if (commits.commits && commits.commits.length > 0) {
              commits.commits.slice(0, 15).forEach(commit => {
                const msg = commit.commit.message.split('\n')[0];
                const shortSha = commit.sha.slice(0, 7);
                commitList += `- [\`${shortSha}\`](${commit.html_url}) ${msg}\n`;
              });
            } else {
              commitList = '- 没有新提交\n';
            }
            
            // 更新 PR 描述
            const updatedBody = 
              "## 🤖 定时自动合并请求（已更新）\n\n" +
              "### 📋 基本信息\n" +
              `- **最后更新**: ${new Date().toISOString()}\n` +
              `- **提交总数**: ${commits.total_commits || 0}\n\n` +
              "### 📝 最新提交列表\n" +
              `${commitList}\n` +
              "### ✅ 自动处理\n" +
              "此 PR 由 GitHub Actions 机器人创建，将**自动合并**到 `main` 分支。\n\n" +
              "---\n" +
              `*自动更新于 ${new Date().toISOString()}*`;
            
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              body: updatedBody
            });
            
            console.log(`✅ 更新 PR #${prNumber}`);

      - name: Send notification
        if: steps.check_updates.outputs.has_updates == 'true'
        run: |
          echo "## 🔄 定时合并任务执行结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **执行时间**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- **提交数**: ${{ steps.commits.outputs.total_count || 0 }}" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.check_pr.outputs.exists }}" == "true" ]; then
            echo "- **操作**: 更新现有 PR #${{ steps.check_pr.outputs.number }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **操作**: 创建新 PR" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "- **状态**: ✅ 完成" >> $GITHUB_STEP_SUMMARY
