name: Schedule Merge to Main

on:
  schedule:
    # 每天凌晨2点运行 [citation:1][citation:5]
    - cron: '0 2 * * *'
  workflow_dispatch:  # 也支持手动触发
    inputs:
      force:
        description: '强制合并（忽略检查）'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-merge-pr:
    name: Create Merge PR from preview to main
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Check if preview has updates
        id: check_updates
        run: |
          git fetch origin preview
          
          # 检查 main 和 preview 的差异
          AHEAD=$(git rev-list --count main..origin/preview)
          
          if [ "$AHEAD" -gt 0 ]; then
            echo "✅ preview 分支领先 main 分支 $AHEAD 个提交"
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "commit_count=$AHEAD" >> $GITHUB_OUTPUT
          else
            echo "ℹ️ preview 分支没有新更新"
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      # 创建合并 PR
      - name: Create Merge Pull Request
        if: steps.check_updates.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: 'preview',
              base: 'main',
              state: 'open'
            });
            
            // 如果已经有打开的 PR，就更新它
            if (pulls.length > 0) {
              const pr = pulls[0];
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                title: `[自动] 合并 preview 到 main (${new Date().toISOString().slice(0,10)})`,
                body: `## 🤖 自动创建的合并请求

                ### 更新内容
                此 PR 将 \`preview\` 分支的更新合并到 \`main\` 分支。
                
                - 包含提交数：${{ steps.check_updates.outputs.commit_count }}
                - 创建时间：${new Date().toISOString()}
                
                ### 下一步
                此 PR 合并后，将触发版本发布流程。
                
                ---
                *由定时任务自动创建*
                `,
                maintainer_can_modify: true
              });
              console.log(`✅ 更新现有 PR #${pr.number}`);
            } else {
              // 创建新的 PR
              const { data: newPR } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[自动] 合并 preview 到 main (${new Date().toISOString().slice(0,10)})`,
                head: 'preview',
                base: 'main',
                body: `## 🤖 自动创建的合并请求

                ### 更新内容
                此 PR 将 \`preview\` 分支的更新合并到 \`main\` 分支。
                
                - 包含提交数：${{ steps.check_updates.outputs.commit_count }}
                - 创建时间：${new Date().toISOString()}
                
                ### 下一步
                此 PR 合并后，将触发版本发布流程。
                
                ---
                *由定时任务自动创建*
                `,
                maintainer_can_modify: true
              });
              console.log(`✅ 创建新 PR #${newPR.number}`);
            }

      # 可选：如果配置了自动合并，可以直接合并 [citation:1][citation:8]
      - name: Auto merge (if enabled)
        if: github.event.inputs.force == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin preview
          git checkout main
          git merge origin/preview --no-ff -m "chore: auto merge preview to main [skip ci]"
          git push origin main
