name: 03 🤖 Auto Merge Main PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled  # 这个很重要，确保添加标签时触发
      - unlabeled
      - ready_for_review
    branches:
      - main
  check_suite:
    types:
      - completed
    branches:
      - main
  pull_request_review:  # 可选：当有 review 时触发
    types:
      - submitted
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    name: Auto Merge
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto merge
        uses: pascalgn/automerge-action@v0.16.4
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          MERGE_LABELS: "auto-merge"  # 只有带此标签的 PR 才会自动合并
          MERGE_REMOVE_LABELS: "auto-merge"  # 合并后移除标签
          MERGE_METHOD: "squash"  # 使用 squash 合并
          MERGE_COMMIT_MESSAGE: "pull-request-title-and-description"  # 提交信息格式
          MERGE_FORKS: "false"  # 不合并 fork 仓库的 PR
          MERGE_RETRIES: "5"  # 失败重试次数
          MERGE_RETRY_SLEEP: "30000"  # 重试间隔
          MERGE_REQUIRED_APPROVALS: "0"  # 不需要人工 approve
          MERGE_DELETE_BRANCH: "true"  # 合并后删除源分支
          UPDATE_METHOD: "merge"  # 自动更新 PR 分支
          UPDATE_LABELS: "auto-merge"  # 只更新带此标签的 PR
